<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Wet+Paint&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-300 via-zinc-200 to-slate-400">

<div class="w-[95%] h-[90vh] rounded-3xl border border-zinc-500 bg-white/30 backdrop-blur-md flex p-10 gap-10 overflow-hidden">

<div class="w-1/4 flex flex-col items-center justify-start gap-6 border-r border-zinc-500 pr-8">
<img src="https://images.unsplash.com/photo-1527980965255-d3b416303d12" class="w-48 h-48 rounded-full object-cover border-4 border-white shadow-xl">
<div class="text-center">
<h2 class="text-2xl font-semibold tracking-wide">Alex Carter</h2>
<p class="text-zinc-700">Frontend Developer</p>
<p class="text-zinc-600 text-sm">Age: 25</p>
<p class="text-zinc-600 text-sm">Sex: Male</p>
</div>
<div class="flex gap-4 mt-4">
<a href="#" class="px-4 py-2 rounded-full bg-black text-white hover:scale-110 transition">GitHub</a>
<a href="#" class="px-4 py-2 rounded-full bg-green-600 text-white hover:scale-110 transition">Linktree</a>
</div>
</div>

<div class="w-2/4 flex flex-col items-center justify-center relative overflow-hidden">
<h1 id="projectTitle" class="text-6xl wobble mb-6 text-center">Project One</h1>
<div id="stack" class="relative w-80 h-[420px]">
<div class="projectCard absolute w-full h-full rounded-2xl bg-white shadow-2xl transition-all duration-700" style="background-image:url('https://images.unsplash.com/photo-1509395176047-4a66953fd231'); background-size:cover;"></div>
<div class="projectCard absolute w-full h-full rounded-2xl bg-white shadow-2xl transition-all duration-700 translate-x-4 translate-y-4 opacity-70" style="background-image:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7'); background-size:cover;"></div>
<div class="projectCard absolute w-full h-full rounded-2xl bg-white shadow-2xl transition-all duration-700 translate-x-8 translate-y-8 opacity-40" style="background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee'); background-size:cover;"></div>
</div>
</div>

<div class="w-1/4 flex items-center justify-center">
<div id="preview" class="w-72 h-[420px] rounded-2xl shadow-2xl bg-cover bg-center transition-all duration-700"></div>
</div>

</div>

<script>
const projects = [
{title:"Project One",image:"https://images.unsplash.com/photo-1509395176047-4a66953fd231"},
{title:"Project Two",image:"https://images.unsplash.com/photo-1492724441997-5dc865305da7"},
{title:"Project Three",image:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"}
]

let index = 0
const preview = document.getElementById("preview")
const title = document.getElementById("projectTitle")

function updatePreview(){
preview.style.opacity=0
setTimeout(()=>{
preview.style.backgroundImage=`url(${projects[(index+1)%projects.length].image})`
preview.style.opacity=1
},300)
}

function rotateProjects(){
index=(index+1)%projects.length
title.classList.remove("animateTitle")
void title.offsetWidth
title.textContent=projects[index].title
title.classList.add("animateTitle")
updatePreview()
}

preview.addEventListener("click",rotateProjects)
updatePreview()
</script>

</body>
</html>
